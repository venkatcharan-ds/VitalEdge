<svg viewBox="0 0 600 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <radialGradient id="circleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6666;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dd1111;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#ff8888;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ff3333;stop-opacity:0" />
    </radialGradient>
    
    <filter id="shadowFilter">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ICON SECTION -->
  
  <!-- Glow effect -->
  <circle cx="70" cy="70" r="68" fill="url(#ringGlow)"/>
  
  <!-- Outer ring shadow -->
  <circle cx="70" cy="70" r="66" fill="none" stroke="#880000" stroke-width="3" opacity="0.5" filter="url(#shadowFilter)"/>
  
  <!-- Main circle -->
  <circle cx="70" cy="70" r="64" fill="url(#circleGrad)" stroke="#ff9999" stroke-width="2.5"/>
  
  <!-- Inner shine ring -->
  <circle cx="70" cy="70" r="60" fill="none" stroke="#ffcccc" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Accent dots -->
  <circle cx="70" cy="12" r="3" fill="#ffdddd" opacity="0.9"/>
  <circle cx="128" cy="70" r="3" fill="#ffdddd" opacity="0.9"/>

  <!-- Heartbeat line - horizontal and vertical cross pattern -->
  <!-- Horizontal line -->
  <polyline points="35,70 45,70 48,52 52,88 56,65 64,65 70,45 76,65 84,65 88,85 92,65 100,65 105,70" 
            stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Vertical line -->
  <line x1="70" y1="32" x2="70" y2="108" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- TEXT SECTION -->
  
  <!-- VitalEdge Text -->
  <text x="155" y="90" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="white" letter-spacing="0.5">
    <tspan fill="#ff3333">VITAL</tspan><tspan fill="white">EDGE</tspan>
  </text>
  
  <!-- Red underline -->
  <line x1="155" y1="105" x2="500" y2="105" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Tagline -->
  <text x="155" y="130" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#888888" letter-spacing="0.5" font-weight="400">
    AI-POWERED EMERGENCY CARE
  </text>
</svg>